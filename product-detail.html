<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail — Watuh</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">WATUH</a>
      <ul class="nav-links">
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="cart-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <button class="hamburger" id="hamburger">&#9776;</button>
      </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <div class="container">
      <a href="index.html">Home</a> &rsaquo;
      <a href="products.html">Products</a> &rsaquo;
      <span id="breadcrumbName">Loading...</span>
    </div>
  </div>

  <!-- PRODUCT DETAIL -->
  <section class="product-detail-section container" id="productDetail">
    <p style="padding:2rem 0; color:var(--text-muted)">Loading product...</p>
  </section>

  <!-- RELATED PRODUCTS -->
  <section class="section" id="relatedSection" style="display:none">
    <div class="container">
      <h2 class="section-title">You Might Also Like</h2>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo">WATUH</span>
        <p>Premium hydration for every journey.</p>
      </div>
      <div class="footer-links">
        <h4>Products</h4>
        <a href="products.html">All Bottles</a>
        <a href="products.html">Bestsellers</a>
      </div>
      <div class="footer-links">
        <h4>Brand</h4>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 Watuh. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const id      = parseInt(params.get('id'));
    const product = products.find(p => p.id === id);
    const section = document.getElementById('productDetail');

    if (!product) {
      section.innerHTML = '<p style="padding:4rem 0;">Product not found. <a href="products.html">Back to products</a></p>';
    } else {
      document.title = `${product.name} — Watuh`;
      document.getElementById('breadcrumbName').textContent = product.name;

      section.innerHTML = `
        <div class="detail-layout">
          <div class="detail-images">
            <div class="detail-main-img" style="background:${product.color}; height:480px; border-radius:16px;"></div>
            <div class="detail-thumbs">
              <div class="thumb active" style="background:${product.color};"></div>
              <div class="thumb" style="background:${product.color}cc;"></div>
              <div class="thumb" style="background:${product.color}88;"></div>
            </div>
          </div>
          <div class="detail-info">
            <p class="eyebrow" style="color:var(--accent);">Watuh Collection</p>
            <h1>${product.name}</h1>
            <div class="detail-rating">
              <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
              <span style="color:var(--text-muted); font-size:14px;">4.8 (342 reviews)</span>
            </div>
            <p class="detail-price">$${product.price}</p>
            <p class="detail-desc">${product.description}</p>

            <div class="detail-options">
              <div class="option-group">
                <label>Size</label>
                <div class="size-options">
                  <span class="size-btn">12oz</span>
                  <span class="size-btn active">${product.size}</span>
                  <span class="size-btn">32oz</span>
                  <span class="size-btn">40oz</span>
                </div>
              </div>
              <div class="option-group">
                <label>Color — <strong>${product.colorName}</strong></label>
                <div class="color-options">
                  <span class="color-dot active" style="background:${product.color};"></span>
                  <span class="color-dot" style="background:#1A2F4E;"></span>
                  <span class="color-dot" style="background:#C0392B;"></span>
                  <span class="color-dot" style="background:#2ECC71;"></span>
                </div>
              </div>
              <div class="option-group">
                <label>Quantity</label>
                <div class="qty-control">
                  <button onclick="changeQty(-1)">&#8722;</button>
                  <span id="qtyDisplay">1</span>
                  <button onclick="changeQty(1)">&#43;</button>
                </div>
              </div>
            </div>

            <div class="detail-actions">
              <button class="btn btn-primary btn-full" onclick="addToCartQty(${product.id})">Add to Cart</button>
              <button class="btn btn-outline btn-full" onclick="window.location='cart.html'">View Cart</button>
            </div>

            <div class="detail-features">
              <div class="feat"><span>&#10003;</span> TempShield™ double-wall vacuum insulation</div>
              <div class="feat"><span>&#10003;</span> 18/8 pro-grade stainless steel</div>
              <div class="feat"><span>&#10003;</span> BPA-Free &amp; phthalate-free</div>
              <div class="feat"><span>&#10003;</span> Lifetime warranty</div>
              <div class="feat"><span>&#10003;</span> Available in: ${product.countries.join(', ')}</div>
            </div>
          </div>
        </div>`;

      // Related products
      const related = products.filter(p => p.id !== product.id).slice(0, 4);
      const relatedGrid = document.getElementById('relatedGrid');
      document.getElementById('relatedSection').style.display = 'block';
      related.forEach(p => {
        relatedGrid.innerHTML += `
          <div class="product-card" onclick="window.location='product-detail.html?id=${p.id}'">
            <div class="product-img" style="background:${p.color}"></div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <p class="product-meta">${p.size} · ${p.colorName}</p>
              <div class="product-footer">
                <span class="price">$${p.price}</span>
                <button class="btn-add" onclick="event.stopPropagation(); addToCart(${p.id})">+ Cart</button>
              </div>
            </div>
          </div>`;
      });
    }

    let qty = 1;
    function changeQty(delta) {
      qty = Math.max(1, qty + delta);
      document.getElementById('qtyDisplay').textContent = qty;
    }
    function addToCartQty(id) {
      for (let i = 0; i < qty; i++) addToCart(id);
    }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('open');
    });
  </script>
</body>
</html>
