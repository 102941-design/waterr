<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Watuh</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">WATUH</a>
      <ul class="nav-links">
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="cart-icon active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <button class="hamburger" id="hamburger">&#9776;</button>
      </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your items before checking out.</p>
    </div>
  </div>

  <!-- CART CONTENT -->
  <section class="section">
    <div class="container cart-layout" id="cartLayout">
      <!-- Populated by JS -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo">WATUH</span>
        <p>Premium hydration for every journey.</p>
      </div>
      <div class="footer-links">
        <h4>Products</h4>
        <a href="products.html">All Bottles</a>
      </div>
      <div class="footer-links">
        <h4>Brand</h4>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 Watuh. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function renderCart() {
      const cart    = JSON.parse(localStorage.getItem('watuhCart') || '[]');
      const layout  = document.getElementById('cartLayout');
      const count   = cart.reduce((a, b) => a + b.qty, 0);
      document.getElementById('cartCount').textContent = count;

      if (cart.length === 0) {
        layout.innerHTML = `
          <div class="empty-cart">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any bottles yet.</p>
            <a href="products.html" class="btn btn-primary" style="margin-top:1.5rem; display:inline-block;">Shop Now</a>
          </div>`;
        return;
      }

      const subtotal = cart.reduce((sum, item) => {
        const p = products.find(p => p.id === item.id);
        return sum + (p ? p.price * item.qty : 0);
      }, 0);
      const shipping = subtotal >= 75 ? 0 : 9.99;
      const total    = subtotal + shipping;

      const itemsHTML = cart.map(item => {
        const p = products.find(p => p.id === item.id);
        if (!p) return '';
        return `
          <div class="cart-item" id="cartItem-${p.id}">
            <div class="cart-item-img" style="background:${p.color};"></div>
            <div class="cart-item-info">
              <h4>${p.name}</h4>
              <p>${p.size} · ${p.colorName}</p>
              <div class="cart-item-actions">
                <div class="qty-control">
                  <button onclick="updateCart(${p.id}, ${item.qty - 1})">&#8722;</button>
                  <span>${item.qty}</span>
                  <button onclick="updateCart(${p.id}, ${item.qty + 1})">&#43;</button>
                </div>
                <button class="remove-btn" onclick="removeFromCart(${p.id})">Remove</button>
              </div>
            </div>
            <div class="cart-item-price">$${(p.price * item.qty).toFixed(2)}</div>
          </div>`;
      }).join('');

      layout.innerHTML = `
        <div class="cart-items">
          <div class="cart-items-header">
            <h3>${count} Item${count !== 1 ? 's' : ''}</h3>
            <button onclick="clearCart()" class="clear-btn">Clear cart</button>
          </div>
          ${itemsHTML}
        </div>
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:#2E9E6A">Free</span>' : '$' + shipping.toFixed(2)}</span></div>
          ${shipping > 0 ? `<p class="free-shipping-note">Add $${(75 - subtotal).toFixed(2)} more for free shipping!</p>` : ''}
          <div class="summary-divider"></div>
          <div class="summary-row summary-total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          <button class="btn btn-primary btn-full" onclick="handleCheckout()" style="margin-top:1.5rem;">
            Proceed to Checkout
          </button>
          <a href="products.html" class="btn btn-outline btn-full" style="margin-top:0.75rem; display:block; text-align:center;">
            Continue Shopping
          </a>
          <div class="trust-badges">
            <span>&#128274; Secure Checkout</span>
            <span>&#10003; Free Returns</span>
            <span>&#10003; Lifetime Warranty</span>
          </div>
        </div>`;
    }

    function updateCart(id, newQty) {
      let cart = JSON.parse(localStorage.getItem('watuhCart') || '[]');
      if (newQty <= 0) {
        cart = cart.filter(i => i.id !== id);
      } else {
        const item = cart.find(i => i.id === id);
        if (item) item.qty = newQty;
      }
      localStorage.setItem('watuhCart', JSON.stringify(cart));
      renderCart();
    }

    function removeFromCart(id) {
      let cart = JSON.parse(localStorage.getItem('watuhCart') || '[]');
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('watuhCart', JSON.stringify(cart));
      renderCart();
    }

    function clearCart() {
      if (confirm('Remove all items from your cart?')) {
        localStorage.setItem('watuhCart', '[]');
        renderCart();
      }
    }

    function handleCheckout() {
      alert('Checkout coming soon! This is a school project demo.');
    }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    renderCart();
  </script>
</body>
</html>
